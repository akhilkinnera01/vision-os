triggers:
  - id: sustained-focus-log
    when:
      source: decision.label
      operator: equals
      value: Focused Work
      min_duration_seconds: 5
    then:
      - type: file_append
        path: out/trigger-events.jsonl
      - type: log
        event: trigger_fired
    cooldown_seconds: 15

  - id: whiteboard-group-webhook
    when:
      source: event.event_type
      operator: equals
      value: zone_group_started
      event_metadata_filters:
        zone_id: whiteboard
    then:
      - type: webhook
        url: https://example.com/opencheckin/group
    cooldown_seconds: 30

  - id: desk-b-clear-mqtt
    event_type: zone_cleared
    zone_id: desk_b
    mqtt_host: 127.0.0.1
    mqtt_port: 1883
    mqtt_topic: opencheckin/zones/desk_b
