triggers:
  - id: lab-bench-active-log
    when:
      source: event.event_type
      operator: equals
      value: focus_sustained
    then:
      - type: log
        event: profile_lab_bench_active
    cooldown_seconds: 30

  - id: lab-bench-collaboration-log
    when:
      source: event.event_type
      operator: equals
      value: collaboration_increasing
    then:
      - type: log
        event: profile_lab_bench_collaboration
    cooldown_seconds: 30
