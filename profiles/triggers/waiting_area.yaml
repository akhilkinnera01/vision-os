triggers:
  - id: waiting-area-occupied-log
    when:
      source: event.event_type
      operator: equals
      value: zone_occupied
    then:
      - type: log
        event: profile_waiting_area_occupied
    cooldown_seconds: 15

  - id: waiting-area-cleared-log
    when:
      source: event.event_type
      operator: equals
      value: zone_cleared
    then:
      - type: log
        event: profile_waiting_area_cleared
    cooldown_seconds: 15
